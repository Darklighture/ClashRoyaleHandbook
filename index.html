<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>皇室手册 · 数据宝典</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('images/royale-bg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            color: #e9f2f5;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(210, 180, 100, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(210, 180, 100, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 30% 50%, rgba(255, 200, 80, 0.05) 1px, transparent 1px);
            background-size: 42px 42px, 42px 42px, 16px 16px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(12, 22, 35, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,240,0.1);
            padding: 2.5rem 2rem;
            transition: all 0.2s ease;
            z-index: 2;
            border: 1px solid rgba(210, 180, 100, 0.3);
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .badge {
            display: inline-block;
            background: rgba(210, 180, 100, 0.2);
            backdrop-filter: blur(4px);
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #f5d742;
            margin-bottom: 1.2rem;
            border: 1px solid rgba(210, 180, 100, 0.5);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #d4a373);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .sub {
            font-size: 1rem;
            color: #b9cdff;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
            opacity: 0.9;
        }

        /* 卡片网格 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: rgba(20, 30, 45, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 1.5rem;
            padding: 1.5rem 1.2rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(210, 180, 100, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(30, 45, 65, 0.95);
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(210, 180, 100, 0.5);
            border-color: #ffd966;
        }

        .card:hover .card-img {
            transform: scale(1.05);
            filter: brightness(1.1) contrast(1.05);
        }

        .card-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 1.2rem;
            background: transparent;
            transition: all 0.3s ease;
        }

        .card h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ffecb3;
        }

        .card p {
            font-size: 0.85rem;
            color: #bfd1e0;
            margin-top: 0.25rem;
            line-height: 1.4;
        }

        .footer-note {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.7rem;
            color: #8da1b5;
            border-top: 1px solid rgba(210, 180, 100, 0.2);
            padding-top: 1.5rem;
        }

        @media (max-width: 680px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
            .links-grid {
                gap: 1.2rem;
            }
            .card {
                padding: 1rem;
            }
            .card-img {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>皇室手册</h1>
        <div class="sub">卡牌百科 · 深度数据 · 全面解析皇室战争核心机制</div>
    </div>

    <!-- 卡片网格（8个卡片） -->
    <div class="links-grid">

    </div>

    <div class="footer-note">

</div>

</html>
